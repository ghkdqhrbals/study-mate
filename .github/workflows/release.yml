name: Release iOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version, for example 1.0.17. Leave empty to use the project version."
        required: false
        type: string
      upload_to_app_store_connect:
        description: "Upload the exported IPA to App Store Connect."
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  ios:
    name: Build and Upload iOS
    runs-on: macos-26
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
      APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
      APPSTORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_PRIVATE_KEY_BASE64 }}
      INPUT_VERSION: ${{ inputs.version || '' }}
      UPLOAD_TO_APP_STORE_CONNECT: ${{ github.event_name != 'workflow_dispatch' || inputs.upload_to_app_store_connect }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release secrets
        run: |
          set -euo pipefail

          missing=0
          for name in APPLE_TEAM_ID APPSTORE_CONNECT_KEY_ID APPSTORE_CONNECT_ISSUER_ID APPSTORE_CONNECT_PRIVATE_KEY_BASE64; do
            if [ -z "${!name}" ]; then
              echo "Missing GitHub Actions secret: ${name}" >&2
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare App Store Connect API key
        run: |
          set -euo pipefail

          PRIVATE_KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPSTORE_CONNECT_KEY_ID}.p8"
          echo "${APPSTORE_CONNECT_PRIVATE_KEY_BASE64}" | base64 --decode > "${PRIVATE_KEY_PATH}"
          chmod 600 "${PRIVATE_KEY_PATH}"

          echo "APPSTORE_CONNECT_PRIVATE_KEY_PATH=${PRIVATE_KEY_PATH}" >> "${GITHUB_ENV}"

      - name: Resolve release version
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="$(
              xcodebuild -project StudyMate.xcodeproj \
                -scheme StudyMateiOS \
                -configuration Release \
                -showBuildSettings |
                awk -F '= ' '/MARKETING_VERSION/ { print $2; exit }'
            )"
          fi

          if ! [[ "${VERSION}" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "Invalid release version: ${VERSION}" >&2
            exit 1
          fi

          echo "RELEASE_VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "RELEASE_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"

      - name: Build iOS debug target
        run: |
          xcodebuild -project StudyMate.xcodeproj \
            -scheme StudyMateiOS \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/iOSDeviceDerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Archive iOS app
        run: |
          set -euo pipefail

          xcodebuild archive \
            -project StudyMate.xcodeproj \
            -scheme StudyMateiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/iOSReleaseDerivedData \
            -archivePath build/StudyMateiOS.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${APPSTORE_CONNECT_PRIVATE_KEY_PATH}" \
            -authenticationKeyID "${APPSTORE_CONNECT_KEY_ID}" \
            -authenticationKeyIssuerID "${APPSTORE_CONNECT_ISSUER_ID}" \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            MARKETING_VERSION="${RELEASE_VERSION}" \
            CURRENT_PROJECT_VERSION="${RELEASE_BUILD_NUMBER}"

      - name: Verify archive entitlements
        run: |
          set -euo pipefail

          APP_PATH="build/StudyMateiOS.xcarchive/Products/Applications/StudyMate.app"
          test -d "${APP_PATH}"

          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          codesign -d --entitlements - "${APP_PATH}" > "${RUNNER_TEMP}/ios-archive-entitlements.plist"

          grep -q "aps-environment" "${RUNNER_TEMP}/ios-archive-entitlements.plist"
          grep -q "iCloud.io.github.ghkdqhrbals.StudyMate" "${RUNNER_TEMP}/ios-archive-entitlements.plist"
          grep -q "com.apple.developer.icloud-services" "${RUNNER_TEMP}/ios-archive-entitlements.plist"

      - name: Export IPA
        run: |
          set -euo pipefail

          mkdir -p build dist
          cat > build/export-options.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>iCloudContainerEnvironment</key>
            <string>Production</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/StudyMateiOS.xcarchive \
            -exportPath dist \
            -exportOptionsPlist build/export-options.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${APPSTORE_CONNECT_PRIVATE_KEY_PATH}" \
            -authenticationKeyID "${APPSTORE_CONNECT_KEY_ID}" \
            -authenticationKeyIssuerID "${APPSTORE_CONNECT_ISSUER_ID}"

          IPA_PATH="$(find dist -maxdepth 1 -name '*.ipa' -print -quit)"
          if [ -z "${IPA_PATH}" ]; then
            echo "IPA export failed." >&2
            exit 1
          fi

          echo "IPA_PATH=${IPA_PATH}" >> "${GITHUB_ENV}"

      - name: Verify exported IPA entitlements
        run: |
          set -euo pipefail

          mkdir -p build/ipa-check
          unzip -q "${IPA_PATH}" -d build/ipa-check

          APP_PATH="$(find build/ipa-check/Payload -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "${APP_PATH}" ]; then
            echo "Exported IPA does not contain an app bundle." >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          codesign -d --entitlements - "${APP_PATH}" > "${RUNNER_TEMP}/ios-export-entitlements.plist"

          grep -q "aps-environment" "${RUNNER_TEMP}/ios-export-entitlements.plist"
          grep -q "production" "${RUNNER_TEMP}/ios-export-entitlements.plist"
          grep -q "iCloud.io.github.ghkdqhrbals.StudyMate" "${RUNNER_TEMP}/ios-export-entitlements.plist"
          grep -q "com.apple.developer.icloud-services" "${RUNNER_TEMP}/ios-export-entitlements.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BuddyStudy-iOS-${{ env.RELEASE_VERSION }}-${{ env.RELEASE_BUILD_NUMBER }}
          path: dist/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload to App Store Connect
        if: env.UPLOAD_TO_APP_STORE_CONNECT == 'true'
        run: |
          set -euo pipefail

          cat > build/upload-options.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>upload</string>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>iCloudContainerEnvironment</key>
            <string>Production</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/StudyMateiOS.xcarchive \
            -exportPath build/app-store-upload \
            -exportOptionsPlist build/upload-options.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${APPSTORE_CONNECT_PRIVATE_KEY_PATH}" \
            -authenticationKeyID "${APPSTORE_CONNECT_KEY_ID}" \
            -authenticationKeyIssuerID "${APPSTORE_CONNECT_ISSUER_ID}"
